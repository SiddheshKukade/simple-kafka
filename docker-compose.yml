version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka-sid
    ports:
      - "9092:9092"

    environment:
     KAFKA_KRAFT_MODE: 'true'
     CLUSTER_ID: 'myclusterid'
     KAFKA_NODE_ID: 1
     KAFKA_PROCESS_ROLES: broker, controller
     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 #1 MEANS NO BACKUP, MORE THAN ONE MEANS N MEANS N COPY OF KAFKA METADATA WBICH MSG EACH CONSUMER HAS READ. BASCIALLY LIKE A JOURNAL
     KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLLER://0.0.0.0:9093
     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

     KAFKA_LOG_DIRS: /tmp/kafka-combined-logs

    volumes:
     - kafka-kraft:/var/lib/kafka/data
volumes:
  kafka-kraft: